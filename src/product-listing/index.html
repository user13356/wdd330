<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    
  </head>

  <body>
    <header class="divider" id="ajaxHeader">
    </header>
    <main>
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="/images/banner-sm.jpg 500w, images/banner.jpg"
          alt="image of a high mountain lake"
        />
      <section class="icons">
                <div>
                    <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-tents.svg" alt="personalized training icon" width="120" height="100" >
                    <button id="tents">Tents</button>
                  
                </div>
                <div>
                    <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-backpacks.svg" alt="coach led classes icon" width="100" height="90">
                    <button id="backpacks"> Backpacks</button>
                    
                </div>
                <div>
                    <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-sleepingbags.svg" alt="personalized training icon" width="120" height="100">
                    <button id="sleeping-bags"> Sleeping bags</button>
                   
                   
                </div>
                <div>
                    <img src="https://byui-cse.github.io/wdd330-ww-course/images/category-hammocks.svg" alt="personalized training icon" width="120" height="100">
                    <button id="hammocks">Hammocks</button>
                   
                </div>
        <ul class="product-list">  
        </ul>
    </main>
    <footer id="ajaxFooter">
      
    </footer>
    <script src="/js/ProductListing.js" type="module"></script>
  </body>

</html>
