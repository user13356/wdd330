<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="css/style.css" />
    <script src='/js/checkout.js' type="module"></script>
  </head>

  <body>
    <header class="divider" id="ajaxHeader">
      
    </header>

    
    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
        <form method="get">
          <fieldset id="name">
          <label for="fname"> First Name <input type="text" name="name" id="fname" required></label>
          <label for="lname"> Last Name <input type="text" name="lastname" id="lname"></label>
          </fieldset>
          <address id="address">
          <label for="street"> Street <input type="text" name="street" id="street" required></label>
          <label for="city"> City <input type="text" name="city" id="city" required></label>
          <label for="state"> State <input type="text" name="state" id="state" required></label>
          <label for="zip"> Zip Code <input type ="text" name="zip" id="zip" required></label>
          </address>
          <fieldset id="payment">
          <label for="credit"> Credit Card Number 
            <input name="ccard" id="credit" type="text"
            inputmode="numeric"
            pattern=[0-9] {13,19}
            required 
            placeholder="1234 5678 9012 1234">
          </label>
          <label for="expDate"> Expiration Date  
            <input name="expDate" id="expDate" type="text"
            inputmode="numeric"
            pattern=[0-9] {4}
            required 
            placeholder="01/02">
          </label>
          <label for="secCode"> Security Code 
            <input name="secCode" id="secCode" type="text"
            inputmode="numeric"
            pattern=[0-9] {3-4}
            required 
            placeholder="9012">
          </label>
          </fieldset>
          <h3 id="subtotal"> </h3>
          <h3 id="tax"></h3>
          <h3 id="shipping"></h3>
          <h2 id="total"></h2>
          <button type="button" id="chButton"> Confirm my purchase</button>
        </form>
      </section>
    </main>

    <footer id="ajaxFooter"></footer>
  </body>
</html>
